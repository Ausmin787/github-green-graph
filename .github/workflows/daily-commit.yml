name: Daily Green Commit

# Runs automatically every day + can be triggered manually
on:
  schedule:
    - cron: "0 9 * * *"   # 9:00 AM UTC daily (2:30 PM IST)
  workflow_dispatch:       # manual trigger via GitHub UI

permissions:
  contents: write          # needed to push commits

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Configure git identity
        run: |
          git config user.email "ausmindeb32@gmail.com"
          git config user.name  "Sasanka"

      - name: Increment streak and log activity
        run: |
          mkdir -p activity

          TODAY="$(date -u '+%Y-%m-%d')"

          if grep -q "^$TODAY " activity/log.txt 2>/dev/null; then
            echo "Activity already logged for $TODAY. Skipping duplicate daily commit."
            exit 0
          fi

          # Read current streak, default to 0 if file doesn't exist
          STREAK=$(cat activity/streak.txt 2>/dev/null || echo 0)
          NEW_STREAK=$((STREAK + 1))

          echo "$NEW_STREAK" > activity/streak.txt
          echo "$(date -u '+%Y-%m-%d %H:%M UTC') | streak: $NEW_STREAK" >> activity/log.txt

      - name: Commit and push
        run: |
          git add activity/
          # Only commit if there are staged changes (idempotent)
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: daily activity log $(date -u '+%Y-%m-%d') [streak: $(cat activity/streak.txt)]"
            git push
          fi
